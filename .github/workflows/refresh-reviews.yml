name: Refresh Google review count

# Reads the current Google rating + review count from the Places API and commits
# data/reviews.json when it changes. The push then auto-builds on Netlify (public
# repo, no verified-contributor gate). Fails safe: on any API hiccup the script
# leaves the file untouched and exits 0, so a bad run is a no-op, not a failure.
#
# Requires repo secret GOOGLE_MAPS_API_KEY (a Places-API-enabled Google Cloud key).

on:
  workflow_dispatch:        # manual runs
  schedule:
    - cron: '0 7 1,15 * *'  # ~biweekly: 1st & 15th of each month, 07:00 UTC

permissions:
  contents: write           # allow the job to push the updated reviews.json

concurrency:
  group: refresh-reviews
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Refresh reviews.json
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: python scripts/refresh-reviews.py --out data/reviews.json

      - name: Commit if the number changed
        run: |
          if git diff --quiet -- data/reviews.json; then
            echo "No change — reviews.json is already current."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/reviews.json
            git commit -m "chore: refresh Google review count"
            git push
            echo "Pushed updated reviews.json."
          fi
