name: Refresh Google review count

# Scrapes the current Google rating + review count and commits data/reviews.json
# when it changes. The push then auto-builds on Netlify (repo is public, so no
# verified-contributor gate). Fails safe: if the scrape is blocked, the script
# leaves the file untouched and exits 0, so a blocked run is a no-op, not a failure.

on:
  workflow_dispatch:        # manual runs (used for testing)
  schedule:
    - cron: '0 7 1,15 * *'  # ~biweekly: 1st & 15th of each month, 07:00 UTC

permissions:
  contents: write           # allow the job to push the updated reviews.json

concurrency:
  group: refresh-reviews
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Camoufox browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ runner.os }}-v1

      - name: Install scraper deps + stealth browser
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          # Camoufox is Firefox-based; install its system libs (Actions has sudo).
          sudo "$(which python)" -m playwright install-deps firefox || true
          python -m camoufox fetch

      - name: Refresh reviews.json
        run: python scripts/refresh-reviews.py --out data/reviews.json

      - name: Commit if the number changed
        run: |
          if git diff --quiet -- data/reviews.json; then
            echo "No change — reviews.json is already current."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/reviews.json
            git commit -m "chore: refresh Google review count"
            git push
            echo "Pushed updated reviews.json."
          fi
